worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Limits that matter for webhooks; 8MB covers GitHub's documented maxes.
    client_max_body_size 8M;

    # Docker's embedded DNS — re-resolve upstream hostnames at runtime
    # rather than once at nginx startup. Without this, every backend /
    # frontend rebuild (which hands the container a new IP) turns into
    # a stream of 502s until nginx is also restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;
        server_name _;

        # API and webhooks go to FastAPI. Put the hostname in a variable
        # so nginx uses the runtime resolver above instead of freezing
        # the IP at config-load time. Because ``proxy_pass`` with a
        # variable skips nginx's usual /prefix stripping, we strip the
        # ``/api`` prefix manually via ``rewrite`` before proxying.
        location /api/ {
            set $backend "backend:8000";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Everything else goes to the Next.js app.
        location / {
            set $frontend "frontend:3000";
            proxy_pass http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }
    }
}
