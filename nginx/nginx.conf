worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Limits that matter for webhooks; 8MB covers GitHub's documented maxes.
    client_max_body_size 8M;

    # Docker's embedded DNS — re-resolve upstream hostnames at runtime
    # rather than once at nginx startup. Without this, every backend /
    # frontend rebuild (which hands the container a new IP) turns into
    # a stream of 502s until nginx is also restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Emit nothing that reveals the nginx version to attackers probing
    # for known CVEs. The version is still printable via the container
    # metadata for operators who need it.
    server_tokens off;

    server {
        listen 8080;
        server_name _;

        # API and webhooks go to FastAPI. Put the hostname in a variable
        # so nginx uses the runtime resolver above instead of freezing
        # the IP at config-load time. Because ``proxy_pass`` with a
        # variable skips nginx's usual /prefix stripping, we strip the
        # ``/api`` prefix manually via ``rewrite`` before proxying.
        location /api/ {
            set $backend "backend:8000";
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # Baseline headers. Nginx's ``add_header`` doesn't inherit
            # across location blocks when a child also sets any
            # ``add_header``, so duplicate the shared set here.
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Everything else goes to the Next.js app. The dashboard must
        # never be framed; clickjacking an approve / delete button is
        # the realistic risk there.
        location / {
            set $frontend "frontend:3000";
            proxy_pass http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            # CSP is emitted by the Next.js middleware
            # (frontend/src/middleware.ts) — it stamps a per-request
            # nonce and uses ``'strict-dynamic'`` so inline scripts
            # from Next.js / next-themes run while arbitrary injected
            # scripts don't. Doing it here would be a weaker, static
            # policy.
        }
    }
}
