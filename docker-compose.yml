services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BUGSIFT_ROLE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BUGSIFT_ROLE: worker
      # Talk to Docker through the restricted socket proxy. The worker
      # never sees the real /var/run/docker.sock — if it's RCE'd, the
      # attacker still can't mount the host, read the socket, or touch
      # networks/volumes/secrets on the daemon.
      DOCKER_HOST: tcp://docker-proxy:2375
    command: ["python", "-m", "bugsift.workers.runner"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started

  docker-proxy:
    # Scoped Docker-API gateway. The host socket is mounted *here only*,
    # read-only; tecnativa/docker-socket-proxy gates each API group by
    # env flag. We grant exactly what the repro sandbox needs
    # (images + containers + exec, with the write methods POST/DELETE)
    # and deny everything else (networks, volumes, swarm, secrets, host
    # info, events, etc.). If the worker is compromised it cannot
    # escape, map the host filesystem, or pivot to other containers.
    image: tecnativa/docker-socket-proxy:0.3
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      DELETE: 1
      # Everything else stays 0 (the image defaults):
      # INFO, VERSION, SERVICES, NETWORKS, VOLUMES, SWARM, SECRETS,
      # CONFIGS, PLUGINS, SYSTEM, EVENTS, NODES, SESSION, AUTH, BUILD,
      # COMMIT, DISTRIBUTION, EXEC.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No published ports: only reachable from inside the compose network.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
