name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff
        run: ruff check src tests
      - name: pytest
        run: pytest -q

  frontend:
    name: frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: install
        run: npm install --no-audit --no-fund
      - name: lint
        run: npm run lint --if-present
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test

  security-backend:
    name: backend security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
      - name: bandit security scan
        run: bandit -r src -f json -o bandit-report.json || true
      - name: upload bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: backend/bandit-report.json

  security-frontend:
    name: frontend security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: install
        run: npm install --no-audit --no-fund
      - name: eslint security scan
        run: npm run lint -- --format json --output-file eslint-report.json || true
      - name: check dependencies
        run: npm audit --production --json > npm-audit.json || true
      - name: upload security results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-security-report
          path: |
            frontend/eslint-report.json
            frontend/npm-audit.json

  docker-build:
    name: docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: bugsift-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: bugsift-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
